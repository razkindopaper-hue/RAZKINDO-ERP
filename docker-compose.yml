# ============================================
# Razkindo ERP - Casa OS docker-compose.yml
# Cara deploy: Copy file ini + .env ke STB,
#   lalu jalankan di Casa OS > App > Custom Install
# ============================================

services:
  razkindo-erp:
    image: ghcr.io/henryarthanto/razkindo-erp:latest
    container_name: razkindo-erp
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "81:81"
    env_file:
      - .env
    environment:
      - STB_MODE=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - erp-data:/app/db
      - erp-logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.razkindo.rule=Host(`razkindo.local`)"
      - "traefik.http.services.razkindo.loadbalancer.server.port=3000"

volumes:
  erp-data:
    driver: local
  erp-logs:
    driver: local
