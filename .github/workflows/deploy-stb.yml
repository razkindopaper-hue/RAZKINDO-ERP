# ============================================================
# GitHub Actions — Auto Deploy to STB (Amlogic S9xx)
#
# Trigger: Push to main branch
# Target: root@aml-s9xx-box:/DATA/AppData/razkindo-erp/
#
# Required GitHub Secrets:
#   STB_SSH_HOST     — IP or hostname of STB (e.g., 192.168.1.100)
#   STB_SSH_PORT     — SSH port (default: 22)
#   STB_SSH_USER     — SSH user (default: root)
#   STB_SSH_KEY      — Private SSH key for STB access
# ============================================================

name: Deploy to STB

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

concurrency:
  group: stb-deploy
  cancel-in-progress: false # Don't cancel ongoing deploys

jobs:
  deploy:
    name: 🚀 Deploy to STB
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🔍 Lint check
        run: bun run lint 2>&1 | tail -5
        continue-on-error: true

      - name: 🏗️ Build Next.js (standalone)
        run: bun run build
        env:
          NODE_ENV: production

      - name: 📁 Prepare deploy artifact
        run: |
          # Copy static assets and public dir into standalone output
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/

          # Copy prisma schema (needed for db:push on STB)
          cp -r prisma .next/standalone/

          # Copy .env.local
          cp .env.local .next/standalone/

          # Copy Caddyfile
          cp Caddyfile .next/standalone/ 2>/dev/null || true

          # Create deploy archive
          cd .next/standalone
          tar czf /tmp/razkindo-erp-deploy.tar.gz .

      - name: 🚀 Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STB_SSH_HOST }}
          port: ${{ secrets.STB_SSH_PORT || 22 }}
          username: ${{ secrets.STB_SSH_USER || 'root' }}
          key: ${{ secrets.STB_SSH_KEY }}
          source: "/tmp/razkindo-erp-deploy.tar.gz"
          target: "/tmp/"
          strip_components: 0

      - name: 🔄 Restart application on STB
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STB_SSH_HOST }}
          port: ${{ secrets.STB_SSH_PORT || 22 }}
          username: ${{ secrets.STB_SSH_USER || 'root' }}
          key: ${{ secrets.STB_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            DEPLOY_DIR="/DATA/AppData/razkindo-erp"
            BACKUP_DIR="/DATA/AppData/razkindo-erp-backup-$(date +%Y%m%d-%H%M%S)"
            echo "========================================"
            echo "  Razkindo ERP — STB Deploy"
            echo "  $(date)"
            echo "========================================"

            # 1. Backup current deployment
            if [ -d "$DEPLOY_DIR/node_modules" ]; then
              echo "[1/6] Backing up current deployment..."
              mkdir -p "$BACKUP_DIR"
              cp -r "$DEPLOY_DIR/.env.local" "$BACKUP_DIR/" 2>/dev/null || true
              cp -r "$DEPLOY_DIR/db" "$BACKUP_DIR/" 2>/dev/null || true
              # Keep last 3 backups
              ls -dt /DATA/AppData/razkindo-erp-backup-* 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true
            else
              echo "[1/6] First deployment, no backup needed."
            fi

            # 2. Extract new build
            echo "[2/6] Extracting new build..."
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            tar xzf /tmp/razkindo-erp-deploy.tar.gz
            rm -f /tmp/razkindo-erp-deploy.tar.gz

            # 3. Install production dependencies
            echo "[3/6] Installing dependencies..."
            if command -v bun &> /dev/null; then
              bun install --production --frozen-lockfile 2>/dev/null || bun install --production
            elif command -v npm &> /dev/null; then
              npm install --production
            else
              echo "WARNING: No bun/npm found, skipping install"
            fi

            # 4. Push DB schema if needed
            echo "[4/6] Checking database schema..."
            if [ -f "prisma/schema.prisma" ] && command -v bun &> /dev/null; then
              bunx prisma db push --accept-data-loss 2>/dev/null || echo "DB push skipped (may already be up to date)"
            fi

            # 5. Restart service
            echo "[5/6] Restarting application..."
            # Kill old process
            pkill -f "server.js" 2>/dev/null || true
            pkill -f "next start" 2>/dev/null || true
            sleep 2

            # Start new process
            export NODE_ENV=production
            export STB_MODE=true
            nohup bun server.js > server.log 2>&1 &
            echo "PID: $!"

            # 6. Health check
            echo "[6/6] Health check..."
            sleep 5
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Deploy SUCCESS — HTTP $HTTP_CODE"
            else
              echo "⚠️ Deploy done but health check returned HTTP $HTTP_CODE (may need a moment)"
            fi

            echo "========================================"
            echo "  Deploy complete!"
            echo "========================================"
